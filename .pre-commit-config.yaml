# ローカルの一次ゲート（ADR 0004: CIではなく pre-commit を主とする）。
# 導入: pre-commit install   /   全体実行: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # 型検査（規約: mypy strict）。実装が増えたら additional_dependencies を追加。
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]

  # registry/*.yaml の構造検証（Issue #45, B-4）。yaml.safe_load による構文チェックから格上げ。
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-jsonschema
        name: validate registry/models.yaml schema
        files: ^registry/models\.ya?ml$
        args: ["--schemafile", "registry/schema/models.schema.json"]
      - id: check-jsonschema
        name: validate registry/hardware.yaml schema
        files: ^registry/hardware\.ya?ml$
        args: ["--schemafile", "registry/schema/hardware.schema.json"]

  # 秘密情報のコンテンツベース検知（detect-private-keyは鍵形式のみのため補完。Issue #45, D-1）
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # GitHub Actions workflow の構文/設定ミス検出（Issue #45, B-6）
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # scripts/*.sh の静的解析（Issue #45, B-7）
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: guard-golden-data
        name: guard golden data (公開リポに実評価データを入れない)
        entry: scripts/guard_golden.sh
        language: script
        pass_filenames: false
        always_run: true
      - id: guard-results-append-only
        name: guard results.csv append-only (鉄則4)
        entry: scripts/guard_results_append_only.sh
        language: script
        pass_filenames: false
        always_run: true
      - id: guard-branch-name
        name: guard branch naming convention
        entry: python3 scripts/guard_branch_name.py
        language: system
        pass_filenames: false
        always_run: true
      - id: guard-agent-skills-sync
        name: guard .agents/.claude skills copy-sync
        entry: python3 scripts/sync_agent_skills.py --check
        language: system
        pass_filenames: false
        always_run: true
