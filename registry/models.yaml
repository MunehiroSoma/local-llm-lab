    runtimes: [vllm, ollama, mlx]
    max_model_len: 262144
    profiles: [coding, concierge]
    target_envs: [mac, dgx-spark]      # ~19GB→RTX12/16は窮屈
    notes: "コミュニティ'コーディング王'。'Claude Code代替'。"

