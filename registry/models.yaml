# モデルレジストリ — 「モデル追加 = ここに1行」。詳細は docs/adr/0002, research §13.5。
# ここは"候補宣言"。最終選定は harness/ の PoC 実測で決める（このファイルは真実ではなく計画）。
schema_version: 1

# profile = 用途タグ。target_envs = 載る想定の環境（実確認は fit テスト）。
profiles: [coding, concierge, summarize, vlm, omni]

models:
  # ---- コンシェルジュ / 汎用（日常の本命）----
  - id: gemma4-12b
    hf_repo: google/gemma-4-12b-it
    revision: null            # ← オンボーディング時にコミットハッシュで固定
    modality: [text, image, audio]
    params: 12B
    quantization: [bf16, fp8, q4_k_m]
    runtimes: [vllm, ollama, mlx-vlm]
    max_model_len: 128000
    profiles: [concierge, vlm, summarize]
    target_envs: [mac, rtx-5060ti, rtx-5070, dgx-spark]
    notes: "日常/コンシェルジュ本命。音声入力可。整った日本語。"

  - id: gemma4-26b-a4b
    hf_repo: google/gemma-4-26b-a4b-it
    revision: null
    modality: [text, image, audio]
    params: 26B
    active_params: 4B         # MoE
    quantization: [fp8, q4_k_m]
    runtimes: [vllm, ollama, mlx-vlm]
    max_model_len: 128000
    profiles: [concierge, vlm]
    target_envs: [mac, rtx-5060ti, dgx-spark]
    notes: "MoE(活性4B)。帯域低いMac/DGXで有利。'26B-A4Bは神'評。"

